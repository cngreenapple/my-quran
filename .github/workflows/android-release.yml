name: Android Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p android/keystore

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore/release.keystore
            echo "storeFile=$GITHUB_WORKSPACE/android/keystore/release.keystore" >> android/gradle.properties
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> android/gradle.properties
            echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/gradle.properties
            echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/gradle.properties
          else
            keytool -genkeypair -v \
              -keystore android/keystore/release.keystore \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"

            echo "storeFile=$GITHUB_WORKSPACE/android/keystore/release.keystore" >> android/gradle.properties
            echo "storePassword=android" >> android/gradle.properties
            echo "keyAlias=androiddebugkey" >> android/gradle.properties
            echo "keyPassword=android" >> android/gradle.properties
          fi

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare release artifacts
        id: artifacts
        run: |
          mkdir -p artifacts
          RELEASE_APK="android/app/build/outputs/apk/release/app-release.apk"

          if [ ! -f "$RELEASE_APK" ]; then
            RELEASE_APK=$(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" | head -n 1)
          fi

          if [ -z "$RELEASE_APK" ] || [ ! -f "$RELEASE_APK" ]; then
            echo "Release APK not found in android/app/build/outputs/apk/release"
            exit 1
          fi

          VERSION_SOURCE="${GITHUB_REF_NAME:-dev}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            VERSION_SOURCE="${GITHUB_REF_NAME}"
          else
            PACKAGE_VERSION=$(node -p "require('./package.json').version")
            if [ -n "$PACKAGE_VERSION" ] && [ "$PACKAGE_VERSION" != "0.0.0" ]; then
              VERSION_SOURCE="$PACKAGE_VERSION"
            fi
          fi

          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          SAFE_VERSION=$(echo "$VERSION_SOURCE" | tr '/:' '-' | tr '[:upper:]' '[:lower:]')
          cp "$RELEASE_APK" "artifacts/my-quran-release-${SAFE_VERSION}-b${BUILD_NUMBER}.apk"
          echo "release_artifact=artifacts/my-quran-release-${SAFE_VERSION}-b${BUILD_NUMBER}.apk" >> "$GITHUB_OUTPUT"
          echo "version=${SAFE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-quran-apks
          path: |
            artifacts/my-quran-release-*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.artifacts.outputs.version }} (Build ${{ github.run_number }})
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}-b{1}', steps.artifacts.outputs.version, github.run_number) }}
          files: |
            ${{ steps.artifacts.outputs.release_artifact }}
          draft: false
          prerelease: false
