name: Android Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p android/keystore
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore/release.keystore
            echo "storeFile=$GITHUB_WORKSPACE/android/keystore/release.keystore" >> android/gradle.properties
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> android/gradle.properties
            echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/gradle.properties
            echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/gradle.properties
          fi

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK artifacts
        run: |
          mkdir -p artifacts
          DEBUG_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_APK=$(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" | head -n 1)

          if [ ! -f "$DEBUG_APK" ]; then
            echo "Debug APK not found at $DEBUG_APK"
            exit 1
          fi

          if [ -z "$RELEASE_APK" ]; then
            echo "Release APK not found in android/app/build/outputs/apk/release"
            exit 1
          fi

          cp "$DEBUG_APK" artifacts/my-quran-debug.apk
          cp "$RELEASE_APK" artifacts/my-quran-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-quran-apks
          path: |
            artifacts/my-quran-debug.apk
            artifacts/my-quran-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/my-quran-debug.apk
            artifacts/my-quran-release.apk
          draft: false
          prerelease: false
